<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SOLAR TRACKING - Starboy</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:black;
  color:white;
}
#splash{
  position:fixed; inset:0;
  background:black;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  z-index:9999;
}
.app{
  width:90%;
  max-width:1200px;
  margin:20px auto;
  background:#020617;
  border-radius:25px;
  box-shadow:0 0 30px cyan;
}
.header{
  text-align:center;
  padding:12px;
  font-size:22px;
  font-weight:bold;
  background:linear-gradient(90deg,#38bdf8,#22d3ee);
  color:black;
}
.subheader{font-size:14px}

.main{
  display:flex;
  gap:20px;
  padding:15px;
}

/* Radar */
.panel-area{
  flex:1;
  display:flex;
  justify-content:center;
  align-items:center;
}
.panel{
  width:230px;
  height:230px;
  border-radius:50%;
  border:3px solid cyan;
  position:relative;
  background:
    radial-gradient(circle at center, rgba(0,255,255,0.15), transparent 70%),
    repeating-radial-gradient(circle at center, rgba(0,255,255,0.2) 0 2px, transparent 2px 40px);
  transition:0.5s;
}
.panel::before,.panel::after{
  content:"";
  position:absolute;
  background:rgba(0,255,255,0.4);
}
.panel::before{width:100%;height:1px;top:50%;}
.panel::after{height:100%;width:1px;left:50%;}

.dir{
  position:absolute;
  font-weight:bold;
  color:cyan;
}
.north{ top:5px; left:50%; transform:translateX(-50%); }
.south{ bottom:5px; left:50%; transform:translateX(-50%); }
.east{ right:5px; top:50%; transform:translateY(-50%); }
.west{ left:5px; top:50%; transform:translateY(-50%); }

.sun{
  position:absolute;
  top:50%;
  left:50%;
  font-size:28px;
  color:gold;
  transform-origin:-80px center;
}

/* Right */
.right{flex:2;}
.cards{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:10px;
}
.card{
  border:1px solid cyan;
  border-radius:12px;
  padding:10px;
  text-align:center;
}
.progress{
  width:100%;
  height:10px;
  border:1px solid cyan;
}
.bar{
  height:100%;
  background:cyan;
}

/* Controls */
.controls{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:10px;
  margin-top:10px;
}
button{
  padding:12px;
  border:none;
  border-radius:12px;
  font-weight:bold;
  cursor:pointer;
  background:cyan;
}
.auto{grid-column:span 3; background:gold;}

.table-area{
  margin:15px;
  max-height:200px;
  overflow-y:auto;
}
table{
  width:100%;
  border-collapse:collapse;
  font-size:12px;
}
th,td{
  border:1px solid cyan;
  padding:5px;
  text-align:center;
}
th{background:#022c44;}

.footer{
  text-align:center;
  font-size:12px;
  padding:8px;
  color:#94a3b8;
}

@media(max-width:768px){
  .main{flex-direction:column;}
  .controls{grid-template-columns:1fr 1fr;}
  .auto{grid-column:span 2;}
}
</style>
</head>

<body>

<div id="splash">
  <h1>☀ SOLAR TRACKING</h1>
  <h3>RITTIYAWANNALAI</h3>
  <h3>Team Starboy ⭐</h3>
</div>

<div class="app">
  <div class="header">
    ☀ SOLAR TRACKING
    <div class="subheader">RITTIYAWANNALAI • Team Starboy ⭐</div>
  </div>

  <div class="main">
    <div class="panel-area">
      <div class="panel" id="panel">
        <div class="sun" id="sun">☀</div>
        <div class="dir north">N</div>
        <div class="dir east">E</div>
        <div class="dir south">S</div>
        <div class="dir west">W</div>
      </div>
    </div>

    <div class="right">
      <div class="cards">
        <div class="card">Date<br><b id="dateText"></b></div>
        <div class="card">Time<br><b id="timeText"></b></div>
        <div class="card">Angle<br><b id="angleText">0°</b></div>
        <div class="card">Direction<br><b id="dirText">North</b></div>
        <div class="card">Light<br><b id="lightText">0 lux</b>
          <div class="progress"><div class="bar" id="lightBar"></div></div>
        </div>
        <div class="card">MAX Lux<br><b id="maxLux">0</b></div>
      </div>

      <canvas id="chart" height="120"></canvas>

      <div class="controls">
        <button onclick="rotateLeft()">⬅ LEFT</button>
        <button onclick="rotateRight()">RIGHT ➡</button>
        <button class="auto" onclick="autoRotate()">AUTO MODE</button>
      </div>
    </div>
  </div>

  <div class="table-area">
    <table>
      <thead>
        <tr>
          <th>No</th>
          <th>Time</th>
          <th>Angle</th>
          <th>Dir</th>
          <th>Lux</th>
        </tr>
      </thead>
      <tbody id="logTable"></tbody>
    </table>
  </div>

  <div class="footer">Solar Tracking Project • Team Starboy</div>
</div>

<!-- Sound -->
<audio id="beep" src="https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg"></audio>

<script>
setTimeout(()=>{splash.style.display="none";},2000);

const MAX_LUX=900000;
let angle=0;
let auto=false;
let interval;
let logCount=0;
let peakLux=0;

function updateTime(){
  const now=new Date();
  timeText.innerText=now.toLocaleTimeString();
  dateText.innerText=now.toLocaleDateString();

  // Sun position by time
  const hour=now.getHours()+now.getMinutes()/60;
  angle = (hour/24)*360;
  update();
}
setInterval(updateTime,1000);

function getDirection(a){
  a=(a%360+360)%360;
  if(a>=45 && a<135) return "East";
  if(a>=135 && a<225) return "South";
  if(a>=225 && a<315) return "West";
  return "North";
}

function playSound(){
  document.getElementById("beep").play();
}

function update(){
  panel.style.transform="rotate("+angle+"deg)";
  sun.style.transform="rotate("+angle+"deg)";
  angleText.innerText=angle.toFixed(0)+"°";

  let lux=Math.floor((Math.abs(angle)%360)/360*MAX_LUX);
  lightText.innerText=lux+" lux";
  lightBar.style.width=(lux/MAX_LUX*100)+"%";

  // Glow color
  panel.style.boxShadow=`0 0 ${lux/20000}px gold`;

  let dir=getDirection(angle);
  dirText.innerText=dir;

  if(lux>peakLux){
    peakLux=lux;
    maxLux.innerText=peakLux+" lux";
  }

  addData(lux);
  addLog(lux,dir);
}

function rotateLeft(){angle-=10;playSound();update();}
function rotateRight(){angle+=10;playSound();update();}

function autoRotate(){
  if(auto){clearInterval(interval);auto=false;}
  else{
    auto=true;
    interval=setInterval(()=>{
      angle+=5;
      playSound();
      update();
    },500);
  }
}

// Chart
const chart=new Chart(document.getElementById("chart"),{
  type:"line",
  data:{labels:[],datasets:[{label:"Light (lux)",data:[],borderColor:"cyan",tension:0.3}]},
  options:{scales:{y:{min:0,max:900000}}}
});

function addData(val){
  if(chart.data.labels.length>15){
    chart.data.labels.shift();
    chart.data.datasets[0].data.shift();
  }
  chart.data.labels.push("");
  chart.data.datasets[0].data.push(val);
  chart.update();
}

function addLog(lux,dir){
  logCount++;
  const now=new Date();
  const row=document.createElement("tr");
  row.innerHTML=`
    <td>${logCount}</td>
    <td>${now.toLocaleTimeString()}</td>
    <td>${angle.toFixed(0)}</td>
    <td>${dir}</td>
    <td>${lux}</td>
  `;
  logTable.prepend(row);
}
</script>

</body>
</html>
