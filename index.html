<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SOLAR TRACKING - Starboy</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:black;
  overflow:hidden;
  color:white;
}
canvas#stars{
  position:fixed;
  top:0;left:0;
  z-index:-1;
}
#splash{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:black;
  color:white;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  z-index:9999;
}
.app{
  width:420px;
  margin:auto;
  margin-top:20px;
  background:#020617;
  border-radius:25px;
  box-shadow:0 0 30px cyan;
  overflow:hidden;
}
.header{
  text-align:center;
  padding:15px;
  font-size:22px;
  font-weight:bold;
  background:linear-gradient(90deg,#38bdf8,#22d3ee);
  color:black;
}
.subheader{
  font-size:14px;
}
.panel-area{
  display:flex;
  justify-content:center;
  margin:15px;
}
.panel{
  width:150px;
  height:90px;
  background:linear-gradient(135deg,#3b82f6,#0ea5e9);
  border-radius:10px;
  box-shadow:0 0 20px cyan;
  transition:0.5s;
}
.cards{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  padding:10px;
}
.card{
  border:1px solid cyan;
  border-radius:12px;
  padding:10px;
  text-align:center;
  box-shadow:0 0 10px cyan;
}
.progress{
  width:100%;
  height:10px;
  background:#020617;
  border-radius:10px;
  border:1px solid cyan;
}
.bar{
  height:100%;
  width:50%;
  background:cyan;
}
.controls{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  padding:15px;
}
button{
  padding:12px;
  border:none;
  border-radius:12px;
  font-weight:bold;
  cursor:pointer;
  background:cyan;
  box-shadow:0 0 10px cyan;
}
.auto{
  grid-column:span 2;
  background:gold;
  box-shadow:0 0 10px gold;
}
.footer{
  text-align:center;
  font-size:12px;
  padding:8px;
  color:#94a3b8;
}
</style>
</head>

<body>

<!-- Splash Screen -->
<div id="splash">
  <h1>☀ SOLAR TRACKING</h1>
  <h3>RITTIYAWANNALAI</h3>
  <h3>Team Starboy ⭐</h3>
  <p>Loading...</p>
</div>

<canvas id="stars"></canvas>

<div class="app">
  <div class="header">
    ☀ SOLAR TRACKING
    <div class="subheader">RITTIYAWANNALAI • Team Starboy ⭐</div>
  </div>

  <div class="panel-area">
    <div class="panel" id="panel"></div>
  </div>

  <div class="cards">
    <div class="card">Angle<br><b id="angleText">0°</b></div>
    <div class="card">
      Light<br><b id="lightText">50%</b>
      <div class="progress"><div class="bar" id="lightBar"></div></div>
    </div>
    <div class="card">Voltage<br><b>12.5 V</b></div>
    <div class="card">Current<br><b>1.8 A</b></div>
  </div>

  <canvas id="chart" height="120"></canvas>

  <div class="controls">
    <button onclick="rotateLeft()">⬅ LEFT</button>
    <button onclick="rotateRight()">RIGHT ➡</button>
    <button class="auto" onclick="autoRotate()">AUTO MODE</button>
  </div>

  <div class="footer">Solar Tracking Project • Team Starboy</div>
</div>

<script>
// Splash Screen
setTimeout(()=>{
  document.getElementById("splash").style.display="none";
},2000);

// Stars background
const canvas=document.getElementById("stars");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
let stars=[];
for(let i=0;i<120;i++){
  stars.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:Math.random()*2});
}
function animateStars(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle="white";
  stars.forEach(s=>{
    ctx.beginPath();
    ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.fill();
    s.y+=0.3;
    if(s.y>canvas.height) s.y=0;
  });
  requestAnimationFrame(animateStars);
}
animateStars();

// Panel control
let angle=0;
let auto=false;
let interval;

function update(){
  document.getElementById("panel").style.transform="rotate("+angle+"deg)";
  document.getElementById("angleText").innerText=angle+"°";
  let light=Math.abs(angle)%100;
  document.getElementById("lightText").innerText=light+"%";
  document.getElementById("lightBar").style.width=light+"%";
  addData(light);
}

function rotateLeft(){angle-=10;update();}
function rotateRight(){angle+=10;update();}

function autoRotate(){
  if(auto){
    clearInterval(interval);
    auto=false;
  }else{
    auto=true;
    interval=setInterval(()=>{
      angle+=5;
      update();
    },500);
  }
}

// Chart
const ctxChart=document.getElementById("chart").getContext("2d");
const chart=new Chart(ctxChart,{
  type:"line",
  data:{
    labels:[],
    datasets:[{
      label:"Light %",
      data:[],
      borderColor:"cyan",
      tension:0.3
    }]
  },
  options:{scales:{y:{min:0,max:100}}}
});

function addData(val){
  if(chart.data.labels.length>10){
    chart.data.labels.shift();
    chart.data.datasets[0].data.shift();
  }
  chart.data.labels.push("");
  chart.data.datasets[0].data.push(val);
  chart.update();
}
</script>

</body>
</html>
